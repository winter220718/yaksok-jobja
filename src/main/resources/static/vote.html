<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약속 투표</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📅 약속 잡기</div>
        <a href="index.html" class="nav-link">← 홈</a>
    </nav>

    <main class="main-content">
        <!-- 로딩 -->
        <div id="loadingSpinner" class="loading-spinner">
            <p>약속 정보를 불러오는 중...</p>
        </div>

        <!-- 멤버 선택 화면 -->
        <div id="memberSelectSection" class="hidden">
            <div style="text-align:center;margin-bottom:2rem;">
                <h2 id="scheduleTitleDisplay" style="font-size:1.6rem;font-weight:700;color:var(--gray-800);margin-bottom:0.5rem;"></h2>
                <p style="color:var(--gray-400);font-size:0.95rem;">내 이름을 선택하세요</p>
            </div>
            <div id="memberButtons" class="member-grid"></div>
        </div>

        <!-- 투표 화면 -->
        <div id="voteSection" class="hidden">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
                <button class="btn btn-secondary btn-sm" onclick="backToMemberSelect()">← 다시 선택</button>
                <div>
                    <div style="font-size:1.3rem;font-weight:700;color:var(--gray-800);" id="voteTitleDisplay"></div>
                    <div style="font-size:0.9rem;color:var(--gray-400);" id="voteNameDisplay"></div>
                </div>
            </div>

            <div class="card">
                <p style="color:var(--gray-600);margin-bottom:1.25rem;font-size:0.9rem;">각 날짜에 참여 가능 여부를 선택해주세요</p>
                <div class="calendar-wrapper" style="margin:0 0 1.5rem;">
                    <table class="calendar-table">
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th>참여 가능 여부</th>
                            </tr>
                        </thead>
                        <tbody id="calendarBody"></tbody>
                    </table>
                </div>
                <button class="btn btn-primary btn-lg" onclick="submitVotes()">투표 제출하기</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="resultSection" class="hidden">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
                <button class="btn btn-secondary btn-sm" onclick="backToMemberSelect()">← 다시 투표</button>
                <div class="section-title" style="margin:0;">📊 투표 결과</div>
            </div>
            <div id="resultContent"></div>
        </div>

        <!-- 오류 -->
        <div id="errorMessage" class="error-message hidden"></div>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="/js/vote.js"></script>
    <script src="/js/admin-shortcut.js"></script>
</body>
</html>
